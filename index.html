<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comércio das Índias Ocidentais</title>
    <style>
        /* Reset básico de margens */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #111813;
            color: #e2e8f0;
        }

        /* 1. CABEÇALHO FIXADO NO TOPO DO SITE */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #1b261e; /* Fundo escuro harmonizando com a marca */
            border-bottom: 2px solid #8B7334; /* Detalhe em dourado */
            padding: 12px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 2. ÁREA DA LOGO NO CANTO SUPERIOR ESQUERDO */
        .brand-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            height: 60px; /* Ajuste o tamanho da logo aqui */
            width: auto;
            border-radius: 50%;
            border: 2px solid #8B7334;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05); /* Efeito suave de zoom ao passar o mouse */
        }

        .brand-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3. MENU DE NAVEGAÇÃO */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <!-- ESTRUTURA DO TOPO DO SITE -->
    <header class="site-header">
        <div class="brand-section">
            <!-- Insira aqui o caminho do seu arquivo de imagem -->
            <img src="caminho-da-sua-imagem/logo-comercio.png" alt="Logo Comércio das Índias Ocidentais" class="logo-img">
            <span class="brand-title">Comércio das Índias Ocidentais</span>
        </div>
        
        <nav>
            <ul class="nav-links">
                <li><a href="#inicio">Início</a></li>
                <li><a href="#produtos">Produtos</a></li>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
