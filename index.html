<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comércio das Índias Ocidentais - Hub de Revendas</title>
    <style>
        :root {
            --bg-principal: #0b140e;
            --bg-card: #142419;
            --cor-primaria: #2e7d32;
            --cor-primaria-hover: #388e3c;
            --cor-secundaria: #81c784;
            --cor-alerta: #e53935;
            --texto: #f1f8f3;
            --texto-escuro: #0a120b;
            --texto-secundario: #a3c2a6;
            --header-bg: linear-gradient(135deg, #1b4332, #2d6a4f);
            --card-border: rgba(129, 199, 132, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            padding-bottom: 50px;
        }

        header {
            background: var(--header-bg);
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(46, 125, 50, 0.25);
            position: relative;
            border-bottom: 2px solid #388e3c;
        }

        .logo-header {
            position: absolute;
            top: 15px;
            right: 20px;
            height: 70px;
            width: 70px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            object-fit: contain;
            background: #0b140e;
            border: 2px solid var(--cor-secundaria);
        }

        header h1 {
            font-size: 2.7rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        header p {
            margin-top: 10px;
            color: var(--cor-secundaria);
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.95;
        }

        .btn-admin-trigger {
            position: absolute;
            top: 15px;
            left: 20px;
            background: rgba(10, 18, 11, 0.4);
            color: #ffffff;
            border: 1px solid var(--cor-secundaria);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-admin-trigger:hover {
            background: var(--cor-secundaria);
            color: var(--texto-escuro);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        #painel-admin {
            display: none;
            background: var(--bg-card);
            border: 2px dashed var(--cor-secundaria);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 40px;
            position: relative;
        }

        #painel-admin h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--cor-secundaria);
        }

        .btn-logout {
            position: absolute;
            top: 20px;
            right: 25px;
            background: transparent;
            color: var(--cor-alerta);
            border: 1px solid var(--cor-alerta);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: var(--cor-alerta);
            color: white;
        }

        .form-grupo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) auto;
            gap: 15px;
            align-items: end;
        }

        .form-grupo input {
            background: #1c3323;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 6px;
            color: white;
            font-size: 0.9rem;
        }

        .form-grupo input:focus {
            outline: none;
            border-color: var(--cor-secundaria);
        }

        .form-grupo button {
            background: var(--cor-secundaria);
            color: var(--texto-escuro);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            height: 40px;
            transition: background 0.2s;
        }

        .form-grupo button:hover {
            background: #a5d6a7;
        }

        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .card-produto {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .card-produto:hover {
            transform: translateY(-5px);
            border-color: var(--cor-secundaria);
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.2);
        }

        .btn-excluir {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--cor-alerta);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .btn-excluir:hover {
            background: #c62828;
        }

        .img-container {
            width: 100%;
            height: 180px;
            background: linear-gradient(45deg, #1c3323, #142419);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .img-produto {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-placeholder {
            color: var(--texto-secundario);
            font-size: 0.9rem;
        }

        .info-produto {
            padding: 15px;
        }

        .info-produto h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: var(--texto);
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .tag-categoria {
            display: inline-block;
            background: rgba(129, 199, 132, 0.15);
            color: var(--cor-secundaria);
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .btn-acesso {
            display: block;
            width: 100%;
            background: linear-gradient(90deg, #2e7d32, #388e3c);
            color: #ffffff;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: opacity 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-acesso:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-admin-trigger" id="btn-trigger-topo" onclick="autenticarAdmin()">Área do Administrador</button>
        
        <!-- Logo SVG embutido no canto superior direito -->
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23142419' stroke='%2381c784' stroke-width='4'/><path d='M30 65 Q 50 75 70 65 L 65 72 Q 50 82 35 72 Z' fill='%2381c784'/><path d='M50 20 L 50 65' stroke='%2381c784' stroke-width='4'/><path d='M50 22 Q 75 32 50 45 Q 70 55 50 63 Z' fill='%232e7d32'/></svg>" alt="Comércio das Índias Ocidentais" class="logo-header">
        
        <h1>Comércio das Índias Ocidentais</h1>
        <p>Os produtos mais procurados e recomendados do mercado em um só lugar</p>
    </header>

    <div class="container">
        <div id="painel-admin">
            <h2>Gerenciador de Vitrine (Exclusivo Administrador)</h2>
            <button class="btn-logout" onclick="sairAdmin()">Sair do Painel</button>
            
            <div class="form-grupo">
                <input type="text" id="novo-nome" placeholder="Nome do Produto">
                <input type="text" id="nova-categoria" placeholder="Categoria">
                <input type="text" id="novo-link" placeholder="Link do produto (https://...)">
                <input type="text" id="novo-img" placeholder="Link da imagem (opcional)">
                <button onclick="adicionarProduto()">Adicionar</button>
            </div>
        </div>

        <div class="grid-produtos" id="vitrine"></div>
    </div>

    <script>
        // Cálculo de Hash SHA-256 para verificar a senha
        async function calcularHash(texto) {
            const buffer = new TextEncoder().encode(texto);
            const digest = await crypto.subtle.digest('SHA-256', buffer);
            return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Hash SHA-256 da senha "1zaq2xsw3cde4vfr5bgt6nhy7"
        const hashSenhaMestra = "2a829f046f00db1f8eeec2f58eeb0dc5a54db3ea0c6f5ef5c202022ea13f9f60";

        let produtosPadrao = [
            { id: 1, nome: "Smartphone Premium 128GB", categoria: "Eletrônicos", link: "https://www.google.com", imagem: "" },
            { id: 2, nome: "Fone de Ouvido Bluetooth Noise Cancelling", categoria: "Acessórios", link: "https://www.google.com", imagem: "" },
            { id: 3, nome: "Smartwatch Esportivo À Prova D'água", categoria: "Vestíveis", link: "https://www.google.com", imagem: "" }
        ];

        let produtos = JSON.parse(localStorage.getItem('indias_ocidentais_produtos')) || produtosPadrao;
        const vitrine = document.getElementById('vitrine');
        let isAdminLogado = false;

        function salvarStorage() {
            localStorage.setItem('indias_ocidentais_produtos', JSON.stringify(produtos));
        }

        function escapeHtml(texto) {
            if (!texto) return '';
            return texto
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderizarVitrine() {
            vitrine.innerHTML = "";
            produtos.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'card-produto';
                
                const estiloBotaoExcluir = isAdminLogado ? 'style="display: block;"' : '';

                const blocoImagem = prod.imagem 
                    ? '<img src="' + escapeHtml(prod.imagem) + '" alt="' + escapeHtml(prod.nome) + '" class="img-produto" onerror="this.style.display=\'none\'">'
                    : '<span class="img-placeholder">Imagem do Produto</span>';

                card.innerHTML = 
                    '<button class="btn-excluir" ' + estiloBotaoExcluir + ' onclick="excluirProduto(' + prod.id + ')">Excluir</button>' +
                    '<div>' +
                        '<div class="img-container">' + blocoImagem + '</div>' +
                        '<div class="info-produto">' +
                            '<span class="tag-categoria">' + escapeHtml(prod.categoria) + '</span>' +
                            '<h3>' + escapeHtml(prod.nome) + '</h3>' +
                        '</div>' +
                    '</div>' +
                    '<a href="' + escapeHtml(prod.link) + '" target="_blank" class="btn-acesso">Ir para a Loja</a>';
                
                vitrine.appendChild(card);
            });
        }

        async function autenticarAdmin() {
            const entrada = prompt("Digite a senha de administrador:");
            if (!entrada) return;

            const entradaHash = await calcularHash(entrada);

            if (entradaHash === hashSenhaMestra) {
                isAdminLogado = true;
                document.getElementById('painel-admin').style.display = 'block';
                document.getElementById('btn-trigger-topo').style.display = 'none';
                renderizarVitrine();
                alert("Painel liberado!");
            } else {
                alert("Acesso negado. Senha incorreta.");
            }
        }

        function sairAdmin() {
            isAdminLogado = false;
            document.getElementById('painel-admin').style.display = 'none';
            document.getElementById('btn-trigger-topo').style.display = 'block';
            renderizarVitrine();
            alert("Você saiu da área do administrador.");
        }

        function adicionarProduto() {
            const nome = document.getElementById('novo-nome').value;
            const categoria = document.getElementById('nova-categoria').value;
            const link = document.getElementById('novo-link').value;
            const imagem = document.getElementById('novo-img').value;

            if (!nome || !categoria || !link) {
                alert("Preencha os campos obrigatórios (Nome, Categoria e Link).");
                return;
            }

            const novoItem = {
                id: Date.now(),
                nome: nome,
                categoria: categoria,
                link: link,
                imagem: imagem
            };

            produtos.unshift(novoItem);
            salvarStorage();
            renderizarVitrine();

            document.getElementById('novo-nome').value = "";
            document.getElementById('nova-categoria').value = "";
            document.getElementById('novo-link').value = "";
            document.getElementById('novo-img').value = "";
        }

        function excluirProduto(idProduto) {
            if (confirm("Tem certeza de que deseja remover este produto da vitrine?")) {
                produtos = produtos.filter(prod => prod.id !== idProduto);
                salvarStorage();
                renderizarVitrine();
            }
        }

        renderizarVitrine();
    </script>
</body>
</html>
